<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Z-Tech Scouter - Elite Build v5.0</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --scouter-green: #00ff41;
        --scouter-red: #ff3c3c;
        --scouter-cyan: #00e5ff;
        --scouter-gold: #fcc203;
        --glass-bg: rgba(10, 15, 20, 0.95);
        --interface-lines: rgba(0, 255, 65, 0.15);
      }
      @keyframes playerStrike {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(120px) scale(1.1);
          filter: brightness(2);
        }
        100% {
          transform: translateX(0);
        }
      }
      @keyframes enemyFlinch {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(20px) rotate(5deg);
          filter: brightness(5) sepia(1);
        }
        100% {
          transform: translateX(0);
        }
      }
      @keyframes kiGlow {
        0%,
        100% {
          filter: drop-shadow(0 0 5px var(--scouter-cyan));
        }
        50% {
          filter: drop-shadow(0 0 30px var(--scouter-cyan)) brightness(2);
        }
      }
      @keyframes breathing {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: translate(1px, 1px);
        }
        20% {
          transform: translate(-5px, 2px);
        }
        40% {
          transform: translate(1px, -1px);
        }
        60% {
          transform: translate(-2px, 5px);
        }
      }

      .animate-strike {
        animation: playerStrike 0.35s cubic-bezier(0.45, 0, 0.55, 1);
      }
      .animate-hurt {
        animation: enemyFlinch 0.4s ease-out;
      }
      .ki-active {
        animation: kiGlow 0.4s infinite;
      }
      .idle-breathing {
        animation: breathing 3s ease-in-out infinite;
      }
      .shake-active {
        animation: shake 0.15s infinite;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: "Orbitron", sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .scouter-frame {
        position: relative;
        width: 1150px;
        height: 650px;
        border: 2px solid var(--interface-lines);
        background: var(--glass-bg);
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
        clip-path: polygon(
          40px 0,
          100% 0,
          100% calc(100% - 40px),
          calc(100% - 40px) 100%,
          0 100%,
          0 40px
        );
      }
      .scouter-bridge {
        display: flex;
        height: 100%;
      }
      .scouter-unit {
        width: 500px;
        padding: 30px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .center-bridge {
        width: 150px;
        border-left: 1px solid var(--interface-lines);
        border-right: 1px solid var(--interface-lines);
        background: rgba(0, 255, 65, 0.03);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-evenly;
      }
      .sprite-wrap {
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        background: radial-gradient(
          circle,
          rgba(0, 255, 65, 0.05) 0%,
          transparent 70%
        );
      }
      .sprite-wrap img {
        max-height: 100%;
        transition: transform 0.3s;
      }
      .gauge-label {
        font-family: "Share Tech Mono";
        font-size: 0.7rem;
        color: var(--scouter-green);
        letter-spacing: 3px;
        margin-top: 10px;
        text-transform: uppercase;
      }
      .bar-outer {
        width: 100%;
        height: 16px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #333;
        margin: 6px 0;
        overflow: hidden;
        position: relative;
      }
      .bar-fill {
        height: 100%;
        width: 0%;
        transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .hp-fill {
        background: linear-gradient(90deg, #008f11, var(--scouter-green));
      }
      .e-hp-fill {
        background: linear-gradient(90deg, #8f0000, var(--scouter-red));
      }
      .ki-fill {
        background: linear-gradient(90deg, #008b8b, var(--scouter-cyan));
      }
      .gauge-val {
        position: absolute;
        right: 0;
        bottom: -18px;
        font-size: 0.65rem;
        color: #fff;
        opacity: 0.8;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 25px;
      }
      button {
        font-family: "Orbitron";
        font-weight: 700;
        font-size: 0.75rem;
        background: rgba(0, 255, 65, 0.05);
        color: var(--scouter-green);
        border: 1px solid var(--interface-lines);
        padding: 14px;
        cursor: pointer;
        transition: all 0.2s;
        clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
      }
      button:hover:not(:disabled) {
        background: var(--scouter-green);
        color: #000;
        box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
      }
      button:disabled {
        opacity: 0.15;
        cursor: not-allowed;
      }
      .battle-log {
        width: 1150px;
        height: 160px;
        background: rgba(5, 10, 5, 0.95);
        border: 1px solid var(--interface-lines);
        margin-top: 15px;
        padding: 20px;
        color: var(--scouter-green);
        overflow-y: auto;
        font-family: "Share Tech Mono";
        font-size: 0.9rem;
      }
      .log-entry {
        margin-bottom: 5px;
        border-bottom: 1px solid rgba(0, 255, 65, 0.05);
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 5000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .hidden {
        display: none !important;
      }
      .roster-grid {
        display: flex;
        gap: 20px;
        margin-top: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .char-card {
        border: 3px solid var(--scouter-green);
        padding: 20px;
        cursor: pointer;
        text-align: center;
        width: 180px;
        transition: transform 0.3s;
      }
      .char-card:hover {
        transform: translateY(-10px);
        background: rgba(0, 255, 65, 0.1);
      }
      .zeni-display {
        font-family: "Bangers";
        font-size: 3rem;
        color: var(--scouter-gold);
        margin-bottom: 10px;
      }
      .shop-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
        width: 800px;
        margin-top: 30px;
      }
      .shop-item {
        border: 1px solid var(--scouter-gold);
        padding: 25px;
        background: rgba(252, 194, 3, 0.03);
      }
    </style>
  </head>
  <body>
    <div id="roster-screen" class="overlay">
      <div style="text-align: center; margin-bottom: 30px">
        <div
          style="
            font-family: &quot;Orbitron&quot;;
            font-weight: 900;
            letter-spacing: 10px;
            color: var(--scouter-green);
          "
        >
          Z-TECH SCAN
        </div>
        <h1
          style="
            font-family: &quot;Bangers&quot;;
            font-size: 6rem;
            color: var(--scouter-gold);
            margin: 0;
          "
        >
          Choose your Warrior!
        </h1>
      </div>
      <div id="roster-list" class="roster-grid">
        <div class="char-card" onclick="startCombat('goku')">
          <img
            src="/static/images/goku_standing-removebg-preview.png"
            style="height: 150px"
          />
          <h2 style="color: var(--scouter-green)">SON GOKU</h2>
          <div style="font-size: 0.7rem; color: #aaa">BASE PL: 415</div>
        </div>
        <div id="raditz-slot"></div>
        <div id="nappa-slot"></div>
        <div id="vegeta-slot"></div>
      </div>
    </div>

    <div id="game-ui" class="hidden overlay">
      <div class="scouter-frame" id="scouter-main">
        <div class="scouter-bridge">
          <div class="scouter-unit">
            <div class="sprite-wrap">
              <img id="p-img" src="" class="idle-breathing" />
            </div>
            <h2
              id="p-name"
              style="
                font-family: &quot;Bangers&quot;;
                font-size: 3rem;
                color: var(--scouter-green);
                margin: 0;
              "
            >
              WARRIOR
            </h2>
            <div
              id="passive-status"
              style="
                font-family: &quot;Share Tech Mono&quot;;
                font-size: 0.6rem;
                color: var(--scouter-gold);
                margin-top: 2px;
                text-transform: uppercase;
              "
            >
              BIOMETRIC SYNCING...
            </div>
            <div class="gauge-label">VITAL INTEGRITY</div>
            <div class="bar-outer">
              <div id="p-hp-bar" class="bar-fill hp-fill"></div>
              <div id="p-hp-text" class="gauge-val">0 / 0 VIT</div>
            </div>
            <div class="gauge-label" style="color: var(--scouter-cyan)">
              KI CONCENTRATION
            </div>
            <div class="bar-outer">
              <div id="p-ki-bar" class="bar-fill ki-fill"></div>
              <div id="p-ki-text" class="gauge-val">0 / 100 KI</div>
            </div>
            <div class="controls">
              <button id="btn-jab" onclick="perform('ATTACK', 'jab')">
                ATTACK
              </button>
              <button id="m-btn" onclick="perform('SKILL', 'meteor')">
                SKILL
              </button>
              <button id="g-btn" onclick="perform('GUARD', 'guard')">
                GUARD
              </button>
              <button id="k-btn" onclick="perform('KI-1', 'kamehameha')">
                KI 1
              </button>
              <button id="s-btn" onclick="perform('KI-2', 'spirit_bomb')">
                KI 2
              </button>
              <button
                onclick="location.reload()"
                style="color: var(--scouter-red)"
              >
                RETREAT
              </button>
            </div>
          </div>
          <div class="center-bridge">
            <div style="text-align: center">
              <div style="font-size: 0.6rem; color: var(--scouter-gold)">
                POWER LEVEL
              </div>
              <div
                id="p-pl"
                style="
                  font-family: &quot;Bangers&quot;;
                  font-size: 3rem;
                  color: var(--scouter-gold);
                "
              >
                ---
              </div>
            </div>
            <div
              id="wave-tag"
              style="
                font-family: &quot;Bangers&quot;;
                font-size: 1.8rem;
                color: var(--scouter-green);
              "
            >
              WAVE 1
            </div>
            <div style="text-align: center">
              <div style="font-size: 0.6rem; color: var(--scouter-red)">
                TARGET PL
              </div>
              <div
                id="e-pl"
                style="
                  font-family: &quot;Bangers&quot;;
                  font-size: 3rem;
                  color: var(--scouter-red);
                "
              >
                ---
              </div>
            </div>
          </div>
          <div class="scouter-unit">
            <div class="sprite-wrap">
              <img id="e-img" src="" class="idle-breathing" />
            </div>
            <h2
              id="e-name"
              style="
                font-family: &quot;Bangers&quot;;
                font-size: 3rem;
                color: var(--scouter-red);
                margin: 0;
                text-align: right;
              "
            >
              TARGET
            </h2>
            <div
              class="gauge-label"
              style="text-align: right; color: var(--scouter-red)"
            >
              HOSTILE INTEGRITY
            </div>
            <div class="bar-outer" style="height: 24px">
              <div id="e-hp-bar" class="bar-fill e-hp-fill"></div>
              <div id="e-hp-text" class="gauge-val" style="bottom: 4px">
                0 / 0 INT
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="battle-log" id="log"></div>
    </div>

    <div id="shop-overlay" class="hidden overlay">
      <h1
        style="
          font-family: &quot;Bangers&quot;;
          font-size: 5rem;
          color: var(--scouter-gold);
        "
      >
        SALVAGE TERMINAL
      </h1>
      <div class="zeni-display"><span id="shop-zeni">0</span> ZENI</div>
      <div class="shop-grid"></div>
      <button onclick="nextWave()" style="margin-top: 30px; padding: 20px 80px">
        RE-ENGAGE
      </button>
    </div>

    <script>
      let isBusy = false;
      let currentPlayer = "goku";
      let unlockedList = ["goku"];
      const log = document.getElementById("log");

      async function checkUnlocks() {
        const res = await fetch("/get-unlocked");
        const data = await res.json();
        unlockedList = data.unlocked || ["goku"];
        const ids = ["raditz", "nappa", "vegeta"];
        const config = {
          raditz: { pl: 1200, color: "var(--scouter-red)" },
          nappa: { pl: 4000, color: "#ff8800" },
          vegeta: { pl: 18000, color: "#aa00ff" },
        };
        ids.forEach((id) => {
          const slot = document.getElementById(`${id}-slot`);
          if (!slot) return;
          if (unlockedList.includes(id)) {
            slot.innerHTML = `<div class="char-card" style="border-color: ${config[id].color}" onclick="startCombat('${id}')">
              <img src="/static/images/${id}-standing.png" style="height: 150px;" />
              <h2 style="color: ${config[id].color}">${id.toUpperCase()}</h2>
              <div style="font-size: 0.7rem; color: #aaa;">BASE PL: ${config[id].pl}</div>
            </div>`;
          } else {
            slot.innerHTML = `<div style="border: 3px solid #222; padding: 20px; width: 180px; opacity: 0.3; text-align: center;"><h2>LOCKED</h2></div>`;
          }
        });
      }

      async function startCombat(char) {
        currentPlayer = char;
        const res = await fetch("/select-char", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ character: char }),
        });
        const data = await res.json();

        // Skill Label Fix
        if (char === "raditz") {
          document.getElementById("btn-jab").innerText = "RAPID ATTACK";
          document.getElementById("m-btn").innerText = "BEHIND YOU!";
          document.getElementById("k-btn").innerText = "DOUBLE SUNDAY";
          document.getElementById("s-btn").innerText = "SATURDAY CRASH";
        } else {
          document.getElementById("btn-jab").innerText = "ATTACK";
          document.getElementById("m-btn").innerText = "METEOR";
          document.getElementById("k-btn").innerText = "KAMEHAMEHA";
          document.getElementById("s-btn").innerText = "SPIRIT BOMB";
        }

        document.getElementById("roster-screen").classList.add("hidden");
        document.getElementById("game-ui").classList.remove("hidden");
        document.getElementById("p-img").src =
          char === "goku"
            ? "/static/images/goku_standing-removebg-preview.png"
            : `/static/images/${char}-standing.png`;
        sync(data);
        writeLog(`[LINK]: Biometric sync complete for ${char.toUpperCase()}.`);
      }

      async function perform(label, skill) {
        if (isBusy) return;
        isBusy = true;
        const pImg = document.getElementById("p-img");
        const eImg = document.getElementById("e-img");

        // Sprite Switching Logic for Goku
        if (currentPlayer === "goku") {
          if (skill === "jab")
            pImg.src = "/static/images/goku_punch_1-removebg-preview.png";
          if (skill === "meteor") {
            pImg.src = "/static/images/goku_dash-removebg-preview.png";
            await new Promise((r) => setTimeout(r, 150));
            const combo = [
              "goku_punch_1-removebg-preview.png",
              "goku_meteor_strike_2-removebg-preview.png",
              "goku_meteor_strike_3-removebg-preview.png",
            ];
            for (let s of combo) {
              pImg.src = `/static/images/${s}`;
              pImg.classList.remove("animate-strike");
              void pImg.offsetWidth;
              pImg.classList.add("animate-strike");
              await new Promise((r) => setTimeout(r, 180));
            }
          }
          if (skill === "kamehameha") {
            pImg.src =
              "/static/images/goku_charge_kamehameha-removebg-preview.png";
            pImg.classList.add("ki-active");
            await new Promise((r) => setTimeout(r, 600));
            pImg.src =
              "/static/images/goku_fire_big_kamehameha-removebg-preview.png";
          }
          if (skill === "spirit_bomb") {
            pImg.src = "/static/images/goku_spirit_bomb-removebg-preview.png";
            pImg.classList.add("ki-active");
            await new Promise((r) => setTimeout(r, 800));
            pImg.src =
              "/static/images/goku_fire_spirit_bomb-removebg-preview.png";
          }
          if (skill === "guard")
            pImg.src = "/static/images/goku_block_success-removebg-preview.png";
        }

        if (skill !== "meteor") pImg.classList.add("animate-strike");

        try {
          const res = await fetch("/battle-action", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ skill }),
          });
          const data = await res.json();

          setTimeout(() => {
            eImg.classList.add("animate-hurt");
            sync(data);

            if (data.is_crit) {
              writeLog(`> [CRITICAL]: ${data.message}`, "gold");
              document
                .getElementById("scouter-main")
                .classList.add("shake-active");
              setTimeout(
                () =>
                  document
                    .getElementById("scouter-main")
                    .classList.remove("shake-active"),
                400,
              );
            } else {
              writeLog(`> [DMG]: ${data.message}`, "green");
            }

            if (data.enemy_killed) {
              const shopGrid = document.querySelector(".shop-grid");
              shopGrid.innerHTML = data.shop_items
                .map(
                  (item) => `
                  <div class="shop-item">
                    <h3 style="color:var(--scouter-gold)">${item.name}</h3>
                    <p style="font-size:0.8rem">${item.desc}</p>
                    <button onclick="buy('${item.id}')">${item.cost} Z</button>
                  </div>`,
                )
                .join("");
              setTimeout(
                () =>
                  document
                    .getElementById("shop-overlay")
                    .classList.remove("hidden"),
                1000,
              );
            } else {
              writeLog(`> [COUNTER]: ${data.enemy_msg}`, "red");
            }

            // Fix: Reset to standing frame
            setTimeout(() => {
              pImg.classList.remove("animate-strike", "ki-active");
              eImg.classList.remove("animate-hurt");
              pImg.src =
                currentPlayer === "goku"
                  ? "/static/images/goku_standing-removebg-preview.png"
                  : `/static/images/${currentPlayer}-standing.png`;
              isBusy = false;
            }, 400);
          }, 150);
        } catch (e) {
          writeLog("[ERR]: Scouter link lost.", "red");
          isBusy = false;
        }
      }

      function sync(data) {
        if (!data || !data.player || !data.enemy) return;
        const p = data.player;
        const e = data.enemy;

        // PL and Basic Gauges
        document.getElementById("p-pl").innerText = p.pl.toLocaleString();
        document.getElementById("p-hp-bar").style.width =
          (p.hp / p.max_hp) * 100 + "%";
        document.getElementById("p-hp-text").innerText =
          `${Math.round(p.hp)} VIT`;
        document.getElementById("p-ki-bar").style.width = p.ki + "%";
        document.getElementById("p-ki-text").innerText = `${p.ki} KI`;
        document.getElementById("p-name").innerText = p.char_type.toUpperCase();
        document.getElementById("shop-zeni").innerText = p.zeni;

        document.getElementById("e-pl").innerText = e.pl.toLocaleString();
        document.getElementById("e-hp-bar").style.width =
          (e.hp / e.max_hp) * 100 + "%";
        document.getElementById("e-hp-text").innerText =
          `${Math.round(e.hp)} INT`;
        document.getElementById("e-name").innerText = e.name;

        // Enemy Sprite Logic
        const eImg = document.getElementById("e-img");
        if (e.name === "SAIBAMAN") {
          eImg.src =
            "/static/images/saibaman_background_img-removebg-preview.png";
          eImg.style.transform = "scaleX(1)";
        } else {
          eImg.src = `/static/images/${e.name.toLowerCase()}-standing.png`;
          eImg.style.transform =
            e.name === "RADITZ" ? "scaleX(-1)" : "scaleX(1)";
        }
      }

      async function buy(id) {
        const res = await fetch("/purchase", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ item_id: id }),
        });
        const data = await res.json();
        if (data.player) {
          document.getElementById("shop-zeni").innerText = data.player.zeni;
          sync(data);
          event.target.innerText = "OWNED";
          event.target.disabled = true;
        }
      }

      async function nextWave() {
        const res = await fetch("/next-enemy", { method: "POST" });
        const data = await res.json();
        document.getElementById("shop-overlay").classList.add("hidden");
        document.getElementById("wave-tag").innerText =
          "WAVE " + data.player.wave;
        sync(data);
        checkUnlocks();
      }

      function writeLog(t, c) {
        const d = document.createElement("div");
        d.className = "log-entry";
        if (c === "red") d.style.color = "var(--scouter-red)";
        else if (c === "green") d.style.color = "var(--scouter-green)";
        else if (c === "gold") d.style.color = "var(--scouter-gold)";
        d.innerText = t;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
      }

      window.onload = checkUnlocks;
    </script>
  </body>
</html>
